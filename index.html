<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Finger Particle Writer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Rajdhani:wght@300;400;600&family=Dancing+Script:wght@700&display=swap');
:root{
  --bg:#07000f; --accent:#ff2d78; --gold:#ffd700;
  --cyan:#00f5ff; --purple:#bf5fff; --white:#fff0f8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Rajdhani',sans-serif;overflow:hidden;height:100vh;width:100vw;}
#video{position:absolute;top:-9999px;left:-9999px;width:640px;height:480px;}
#mainCanvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:none;}

/* ── PASSWORD SCREEN ── */
#passScreen{
  position:absolute;inset:0;z-index:200;
  background:radial-gradient(ellipse at 50% 40%,#1a0030 0%,#07000f 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
}
#passScreen .lock-icon{font-size:3.2rem;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px var(--accent));}50%{transform:scale(1.12);filter:drop-shadow(0 0 22px var(--accent));}}
#passScreen h2{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1rem,3vw,1.6rem);
  background:linear-gradient(135deg,var(--gold),var(--accent),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;letter-spacing:2px;
}
#passScreen p{color:rgba(255,255,255,0.45);font-size:0.8rem;letter-spacing:1.5px;text-transform:uppercase;}
.pass-input-wrap{position:relative;display:flex;align-items:center;}
#passInput{
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(191,95,255,0.4);
  color:var(--white);padding:12px 48px 12px 20px;
  font-family:'Rajdhani',sans-serif;font-size:1.1rem;
  letter-spacing:4px;border-radius:12px;outline:none;
  width:240px;text-align:center;
  transition:border-color .3s,box-shadow .3s;
}
#passInput:focus{border-color:var(--cyan);box-shadow:0 0 18px rgba(0,245,255,0.25);}
#eyeBtn{
  position:absolute;right:14px;background:none;border:none;
  color:rgba(255,255,255,0.4);cursor:pointer;font-size:1rem;
  transition:color .2s;
}
#eyeBtn:hover{color:var(--cyan);}
#passErr{
  color:var(--accent);font-size:0.78rem;letter-spacing:1px;
  opacity:0;transition:opacity .3s;height:16px;
}
#passErr.show{opacity:1;}
#passBtn{
  background:linear-gradient(135deg,var(--accent),var(--purple));
  color:#fff;border:none;padding:13px 40px;
  font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;
  letter-spacing:2px;border-radius:50px;cursor:pointer;text-transform:uppercase;
  box-shadow:0 0 28px rgba(255,45,120,0.4);
  transition:transform .2s,box-shadow .2s;
}
#passBtn:hover{transform:scale(1.06);box-shadow:0 0 50px rgba(255,45,120,0.7);}
/* attempt dots */
.dots{display:flex;gap:8px;}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.12);transition:background .3s;}
.dot.filled{background:var(--purple);box-shadow:0 0 8px var(--purple);}
.dot.wrong{background:var(--accent)!important;box-shadow:0 0 8px var(--accent)!important;}

/* ── NAME SCREEN ── */
#nameScreen{
  position:absolute;inset:0;z-index:150;
  background:radial-gradient(ellipse at 50% 40%,#1a0030 0%,#07000f 70%);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  transition:opacity .6s;
}
#nameScreen.visible{display:flex;}

#emailScreen{
  position:absolute;inset:0;z-index:160;
  background:radial-gradient(ellipse at 50% 40%,#1a0030 0%,#07000f 70%);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  transition:opacity .6s;
}
#emailScreen.visible{display:flex;}
#emailScreen .es-icon{font-size:3rem;animation:pulse 2s ease-in-out infinite;}
#emailScreen h2{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1rem,3vw,1.4rem);
  background:linear-gradient(135deg,var(--gold),var(--accent),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;letter-spacing:2px;padding:0 20px;
}
#emailScreen p{color:rgba(255,255,255,0.4);font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase;text-align:center;padding:0 30px;line-height:1.8;}
#emailEntry{
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(191,95,255,0.4);
  color:var(--white);padding:14px 24px;
  font-family:'Rajdhani',sans-serif;font-size:1.1rem;
  letter-spacing:1px;border-radius:14px;outline:none;
  width:290px;text-align:center;
  transition:border-color .3s,box-shadow .3s;
}
#emailEntry:focus{border-color:var(--cyan);box-shadow:0 0 18px rgba(0,245,255,0.25);}
#emailEntry::placeholder{color:rgba(255,255,255,0.2);font-size:.9rem;}
#emailErr2{color:var(--accent);font-size:.75rem;letter-spacing:1px;opacity:0;transition:opacity .3s;height:14px;}
#emailErr2.show{opacity:1;}
#emailSubmitBtn{
  background:linear-gradient(135deg,var(--accent),var(--purple));
  color:#fff;border:none;padding:13px 40px;
  font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;
  letter-spacing:2px;border-radius:50px;cursor:pointer;text-transform:uppercase;
  box-shadow:0 0 28px rgba(255,45,120,0.35);
  transition:transform .2s,box-shadow .2s;
}
#emailSubmitBtn:hover{transform:scale(1.06);box-shadow:0 0 50px rgba(255,45,120,0.6);}

#nameScreen .ns-icon{font-size:3rem;animation:pulse 2s ease-in-out infinite;}
#nameScreen h2{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1rem,3vw,1.5rem);
  background:linear-gradient(135deg,var(--gold),var(--accent),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;letter-spacing:2px;padding:0 20px;
}
#nameScreen p{color:rgba(255,255,255,0.4);font-size:.8rem;letter-spacing:1.5px;text-transform:uppercase;text-align:center;}
#nameEntry{
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(191,95,255,0.4);
  color:var(--white);padding:14px 24px;
  font-family:'Dancing Script',cursive;font-size:1.6rem;
  letter-spacing:3px;border-radius:14px;outline:none;
  width:260px;text-align:center;
  transition:border-color .3s,box-shadow .3s;
}
#nameEntry:focus{border-color:var(--cyan);box-shadow:0 0 18px rgba(0,245,255,0.25);}
#nameEntry::placeholder{color:rgba(255,255,255,0.2);font-size:1rem;font-family:'Rajdhani',sans-serif;}
#nameErr{color:var(--accent);font-size:.75rem;letter-spacing:1px;opacity:0;transition:opacity .3s;height:14px;}
#nameErr.show{opacity:1;}
#nameSubmitBtn{
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  color:#000;border:none;padding:13px 40px;
  font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;
  letter-spacing:2px;border-radius:50px;cursor:pointer;text-transform:uppercase;
  box-shadow:0 0 28px rgba(0,245,255,0.35);
  transition:transform .2s,box-shadow .2s;
}
#nameSubmitBtn:hover{transform:scale(1.06);box-shadow:0 0 50px rgba(0,245,255,0.6);}
.gender-btn{
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(191,95,255,0.35);
  color:rgba(255,255,255,0.55);padding:9px 20px;
  font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:600;
  letter-spacing:1px;border-radius:50px;cursor:pointer;
  transition:all .2s;
}
.gender-btn.active{
  background:rgba(191,95,255,0.2);
  border-color:var(--purple);color:#fff;
  box-shadow:0 0 16px rgba(191,95,255,0.4);
}

/* ── LOAD SCREEN ── */
#loadScreen{
  position:absolute;inset:0;background:var(--bg);z-index:100;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  transition:opacity .8s;
}
#loadScreen.visible{display:flex;}
#loadScreen h1{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1.1rem,3.5vw,2rem);
  background:linear-gradient(135deg,var(--gold),var(--accent),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;padding:0 20px;
}
#loadScreen p{color:rgba(255,255,255,0.5);font-size:.85rem;text-align:center;max-width:340px;line-height:1.7;padding:0 20px;}
#startBtn{
  background:linear-gradient(135deg,var(--accent),var(--purple));
  color:#fff;border:none;padding:13px 34px;
  font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;
  letter-spacing:2px;border-radius:50px;cursor:pointer;text-transform:uppercase;
  box-shadow:0 0 28px rgba(255,45,120,0.45);
  transition:transform .2s,box-shadow .2s;
}
#startBtn:hover{transform:scale(1.06);box-shadow:0 0 48px rgba(255,45,120,0.7);}
#spinner{display:none;width:38px;height:38px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--cyan);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

/* ── TOP UI ── */
#ui{position:absolute;top:0;left:0;right:0;pointer-events:none;z-index:10;padding:16px 24px;display:flex;align-items:flex-start;justify-content:space-between;}
#title{font-family:'Cinzel Decorative',cursive;font-size:1rem;color:var(--gold);text-shadow:0 0 18px var(--gold),0 0 36px var(--accent);letter-spacing:2px;}
#statusPanel{text-align:right;font-size:.75rem;letter-spacing:1px;color:var(--cyan);}
#statusDot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#444;margin-right:5px;vertical-align:middle;transition:background .3s;}
#statusDot.on{background:#00ff88;box-shadow:0 0 8px #00ff88;}
#fingerDisp{margin-top:4px;color:var(--purple);font-size:.7rem;}

/* ── NAME INPUT ── */
#nameBox{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);z-index:20;display:flex;align-items:center;gap:8px;pointer-events:all;}
#nameInput{background:rgba(255,255,255,0.07);border:1px solid rgba(0,245,255,.3);color:var(--white);padding:9px 16px;font-family:'Rajdhani',sans-serif;font-size:.95rem;letter-spacing:2px;border-radius:8px;outline:none;width:200px;text-transform:uppercase;transition:border-color .3s,box-shadow .3s;}
#nameInput:focus{border-color:var(--cyan);box-shadow:0 0 14px rgba(0,245,255,.2);}
#nameInput::placeholder{color:rgba(255,255,255,.22);font-size:.75rem;}
#setBtn{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#000;border:none;padding:9px 16px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:1.5px;border-radius:8px;cursor:pointer;text-transform:uppercase;transition:transform .2s;}
#setBtn:hover{transform:scale(1.05);}

/* ── HEART TEXT OVERLAY ── */

/* ── SETTINGS BUTTON ── */
#settingsBtn{
  position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(191,95,255,0.3);
  color:rgba(255,255,255,0.6);
  width:38px;height:38px;border-radius:50%;
  font-size:1.1rem;cursor:pointer;
  transition:all .2s;z-index:25;
  pointer-events:all;
}
#settingsBtn:hover{background:rgba(191,95,255,0.2);color:#fff;border-color:var(--purple);}

/* ── SETTINGS MODAL ── */
#settingsModal{
  position:fixed;inset:0;z-index:800;
  background:rgba(7,0,15,0.93);backdrop-filter:blur(14px);
  display:none;align-items:center;justify-content:center;
}
#settingsModal.open{display:flex;}
#settingsBox{
  background:linear-gradient(145deg,#130022,#0d0018);
  border:1.5px solid rgba(191,95,255,0.4);
  border-radius:26px;padding:36px 32px 28px;
  max-width:400px;width:92%;text-align:center;
  box-shadow:0 0 80px rgba(191,95,255,0.25);
  animation:popIn .4s cubic-bezier(.17,.67,.35,1.3);
}
.set-icon{font-size:2.4rem;margin-bottom:10px;}
.set-title{
  font-family:'Cinzel Decorative',cursive;
  font-size:1.1rem;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.set-sub{color:rgba(255,255,255,0.35);font-size:.75rem;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px;}
.set-field{text-align:left;margin-bottom:14px;}
.set-field label{display:block;font-size:.75rem;letter-spacing:1px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:5px;}
.set-field input{
  width:100%;background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(191,95,255,0.3);
  color:#fff;padding:11px 16px;
  font-family:'Rajdhani',sans-serif;font-size:1rem;
  border-radius:10px;outline:none;
  transition:border-color .3s;
}
.set-field input:focus{border-color:var(--cyan);}
.set-err{color:var(--accent);font-size:.8rem;letter-spacing:1px;min-height:18px;margin-bottom:8px;}
.set-divider{
  font-family:'Rajdhani',sans-serif;font-size:.75rem;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);margin:16px 0 14px;
  border-top:1px solid rgba(255,215,0,0.2);padding-top:14px;
}
.set-btns{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.set-verify-btn{
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  color:#000;border:none;padding:11px 24px;
  font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;
  letter-spacing:1.5px;border-radius:50px;cursor:pointer;text-transform:uppercase;
}
.set-save-btn{
  background:linear-gradient(135deg,#00c853,#00e676);
  color:#000;border:none;padding:11px 24px;
  font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;
  letter-spacing:1.5px;border-radius:50px;cursor:pointer;text-transform:uppercase;
}
.set-cancel-btn{
  background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);
  border:1.5px solid rgba(255,255,255,0.15);padding:11px 24px;
  font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:600;
  letter-spacing:1.5px;border-radius:50px;cursor:pointer;text-transform:uppercase;
}


#stepBar{
  position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:10px;align-items:center;pointer-events:none;
}
.step-dot{
  width:11px;height:11px;border-radius:50%;
  background:rgba(255,255,255,0.12);
  border:1.5px solid rgba(255,255,255,0.2);
  transition:all .4s;
}
.step-dot.done{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px var(--gold);}
.step-dot.active{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 14px var(--cyan);transform:scale(1.3);}
#stepHint{
  position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
  z-index:20;pointer-events:none;
  font-family:'Rajdhani',sans-serif;font-size:.75rem;letter-spacing:2px;
  color:rgba(255,255,255,0.3);text-transform:uppercase;white-space:nowrap;
  transition:opacity .5s;
}

/* ── GESTURE POPUP (3 & 4 fingers) ── */
#gesturePopup{
  position:fixed;top:38%;left:50%;
  transform:translate(-50%,-50%) scale(0.7);
  z-index:300;pointer-events:none;
  text-align:center;opacity:0;
  transition:opacity .35s,transform .35s cubic-bezier(.17,.67,.35,1.4);
}
#gesturePopup.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.gp-box{
  background:linear-gradient(145deg,rgba(18,0,32,0.95),rgba(13,0,24,0.95));
  border:1.5px solid rgba(191,95,255,0.5);border-radius:22px;
  padding:26px 34px 22px;
  box-shadow:0 0 60px rgba(191,95,255,0.3),0 0 120px rgba(255,45,120,0.15);
  backdrop-filter:blur(8px);min-width:260px;max-width:85vw;
}
.gp-icon{font-size:2rem;margin-bottom:8px;filter:drop-shadow(0 0 10px var(--accent));}
.gp-for{font-family:'Cinzel Decorative',cursive;font-size:.65rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;text-shadow:0 0 10px var(--gold);margin-bottom:6px;}
.gp-msg{font-family:'Dancing Script',cursive;font-size:clamp(1.3rem,4vw,2rem);color:#fff;text-shadow:0 0 20px var(--accent),0 0 40px #ff6699;line-height:1.5;}

/* ── PROPOSAL MODAL ── */
#proposalModal{
  position:fixed;inset:0;z-index:600;
  background:rgba(7,0,15,0.92);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;
}
#proposalModal.open{display:flex;}
#proposalBox{
  background:linear-gradient(145deg,#130022,#0d0018);
  border:1.5px solid rgba(255,45,120,0.5);
  border-radius:26px;padding:40px 36px 32px;
  max-width:400px;width:92%;text-align:center;
  box-shadow:0 0 80px rgba(255,45,120,0.3),0 0 160px rgba(191,95,255,0.15);
  animation:popIn .45s cubic-bezier(.17,.67,.35,1.3);
}
@keyframes popIn{from{transform:scale(.65);opacity:0;}to{transform:scale(1);opacity:1;}}
#proposalBox .pr-ring{font-size:3rem;margin-bottom:12px;animation:ringFloat 2s ease-in-out infinite;}
@keyframes ringFloat{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-8px) rotate(5deg);}}
#proposalBox .pr-for{font-family:'Cinzel Decorative',cursive;font-size:.7rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;text-shadow:0 0 12px var(--gold);margin-bottom:8px;}
#proposalBox .pr-name{font-family:'Dancing Script',cursive;font-size:2.2rem;color:#fff;text-shadow:0 0 20px var(--accent),0 0 40px #ff6699;display:block;margin-bottom:18px;}
#proposalBox .pr-question{
  font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:600;
  color:rgba(255,240,248,0.95);letter-spacing:1px;
  background:rgba(255,45,120,0.08);border:1px solid rgba(255,45,120,0.25);
  padding:16px 20px;border-radius:14px;margin-bottom:26px;line-height:1.5;
}
.pr-btns{display:flex;gap:14px;justify-content:center;}
#yesBtn{
  background:linear-gradient(135deg,#00c853,#00e676);
  color:#000;border:none;padding:13px 32px;
  font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;
  letter-spacing:2px;border-radius:50px;cursor:pointer;
  box-shadow:0 0 28px rgba(0,200,83,0.5);
  transition:transform .2s,box-shadow .2s;
}
#yesBtn:hover{transform:scale(1.08);box-shadow:0 0 48px rgba(0,200,83,0.8);}
#noBtn{
  background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.6);border:1.5px solid rgba(255,255,255,0.2);
  padding:13px 32px;font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:600;
  letter-spacing:2px;border-radius:50px;cursor:pointer;
  transition:all .2s;
}
#noBtn:hover{background:rgba(255,45,120,0.2);border-color:var(--accent);color:#fff;}

/* ── YES RESPONSE MODAL ── */
#yesModal{
  position:fixed;inset:0;z-index:700;
  background:rgba(7,0,15,0.93);backdrop-filter:blur(14px);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;
}
#yesModal.open{display:flex;}
#yesBox{
  background:linear-gradient(145deg,#0a1a00,#0d1800);
  border:1.5px solid rgba(0,200,83,0.5);
  border-radius:26px;padding:40px 36px 32px;
  max-width:420px;width:92%;text-align:center;
  box-shadow:0 0 80px rgba(0,200,83,0.3),0 0 160px rgba(255,215,0,0.1);
  animation:popIn .45s cubic-bezier(.17,.67,.35,1.3);
}
#yesBox .yes-icon{font-size:3.5rem;margin-bottom:14px;animation:heartBeat 1s ease-in-out infinite;}
@keyframes heartBeat{0%,100%{transform:scale(1);}14%{transform:scale(1.2);}28%{transform:scale(1);}42%{transform:scale(1.15);}70%{transform:scale(1);}}
#yesBox .yes-title{font-family:'Cinzel Decorative',cursive;font-size:1rem;letter-spacing:3px;background:linear-gradient(135deg,var(--gold),#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;text-transform:uppercase;}
#yesBox .yes-name{font-family:'Dancing Script',cursive;font-size:2.4rem;color:#fff;text-shadow:0 0 20px #00ff88,0 0 40px var(--gold);display:block;margin-bottom:16px;}

<style>
/* ── SETTINGS BTN fix - must be clickable ── */
#settingsBtn{
  position:fixed !important;
  top:14px;right:14px;
  background:rgba(255,255,255,0.10);
  border:1.5px solid rgba(191,95,255,0.5);

  z-index:500 !important;

  display:flex;align-items:center;justify-content:center;

<body>
<video id="video" autoplay muted playsinline></video>
<canvas id="mainCanvas"></canvas>

<!-- ══ PASSWORD SCREEN ══ -->
<div id="passScreen">
  <div class="lock-icon">🔐</div>
  <h2>Welcome</h2>
  <p>Enter Password</p>
  <div class="dots" id="dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
  <div class="pass-input-wrap">
    <input id="passInput" type="password" placeholder="••••••" maxlength="20" autocomplete="off"/>
    <button id="eyeBtn" onclick="toggleEye()">👁</button>
  </div>
  <div id="passErr"></div>
  <button id="passBtn" onclick="checkPass()">🔓 Enter</button>
</div>

<!-- emailScreen dummy (JS ke liye) -->
<div id="emailScreen" style="display:none!important;">
  <input id="emailEntry" style="display:none"/>
  <div id="emailErr2" style="display:none"></div>
</div>

<!-- ══ NAME SCREEN ══ -->
<div id="nameScreen">
  <div class="ns-icon">💕</div>
  <h2 id="nameScreenTitle">Sirf Tera Naam ✨</h2>
  <p id="nameScreenSub">Apna khaas naam daalo</p>
  <input id="nameEntry" type="text" placeholder="Naam..." maxlength="20" autocomplete="off"/>
  <div style="display:flex;gap:12px;margin-top:4px;">
    <button class="gender-btn active" id="gBtn-f" onclick="selectGender('f')">👩 Larki</button>
    <button class="gender-btn" id="gBtn-m" onclick="selectGender('m')">👦 Larka</button>
  </div>
  <div id="nameErr"></div>
  <button id="nameSubmitBtn" onclick="submitName()">Aage Jao ✨</button>
</div>

<!-- ══ LOAD SCREEN ══ -->
<div id="loadScreen">
  <h1>✨ Finger Particle Writer</h1>
  <button id="startBtn" onclick="startCamera()">▶ Camera Start Karo</button>
  <div id="spinner"></div>
</div>

<!-- ══ TOP UI (pointer-events:none) ══ -->
<div id="ui">
  <div id="title">✦ Particle Writer</div>
  <div id="statusPanel">
    <div><span id="statusDot"></span><span id="statusTxt">Camera Off</span></div>
    <div id="fingerDisp">Fingers: —</div>
  </div>
</div>

<!-- ══ SETTINGS BUTTON — outside ui div so it's always clickable ══ -->
<button id="settingsBtn" onclick="openSettings()" title="Settings">⚙️</button>

<div id="stepHint">✋ Pehle 5 fingers dikhao</div>
<div id="stepBar">
  <div class="step-dot active" id="s5"></div>
  <div class="step-dot" id="s4"></div>
  <div class="step-dot" id="s3"></div>
  <div class="step-dot" id="s1"></div>
  <div class="step-dot" id="s2"></div>
</div>

<!-- ══ GESTURE POPUP ══ -->
<div id="gesturePopup">
  <div class="gp-box">
    <div class="gp-icon" id="gpIcon">🤟</div>
    <div class="gp-for" id="gpFor">For</div>
    <div class="gp-msg" id="gpMsg"></div>
  </div>
</div>

<!-- ══ PROPOSAL MODAL ══ -->
<div id="proposalModal">
  <div id="proposalBox">
    <div class="pr-ring">💍</div>
    <div class="pr-for">Ek Sawaal Hai</div>
    <span class="pr-name" id="prName">LOVE</span>
    <div class="pr-question" id="prQuestion"></div>
    <div class="pr-btns">
      <button id="yesBtn" onclick="handleYes()">💚 Haan Ji!</button>
      <button id="noBtn" onclick="handleNo()">Na...</button>
    </div>
  </div>
</div>

<!-- ══ YES MODAL ══ -->
<div id="yesModal">
  <div id="yesBox">
    <div class="yes-icon">💑</div>
    <div class="yes-title">Shukriya Jaan!</div>
    <span class="yes-name" id="yesName">LOVE</span>
    <div class="yes-msg" id="yesMsg"></div>
    <div id="emailStatus" style="margin-top:14px;font-size:.8rem;letter-spacing:1px;color:rgba(255,255,255,0.4);min-height:18px;"></div>
    <button id="yesContinueBtn" onclick="closeYesModal()" style="
      margin-top:22px;
      background:linear-gradient(135deg,#00c853,#00e676);
      color:#000;border:none;padding:12px 36px;
      font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;
      letter-spacing:2px;border-radius:50px;cursor:pointer;text-transform:uppercase;
      box-shadow:0 0 24px rgba(0,200,83,0.5);
      transition:transform .2s,box-shadow .2s;
    ">💚 Theek Hai!</button>
  </div>
</div>

<!-- ══ SETTINGS MODAL ══ -->
<div id="settingsModal">
  <div id="settingsBox">
    <div class="set-icon">⚙️</div>
    <h2 class="set-title">Settings</h2>
    <p class="set-sub">Pehle apni identity verify karo</p>

    <!-- VERIFY SECTION -->
    <div id="setVerifySection">
      <div class="set-field">
        <label>🔑 Password</label>
        <input id="setPassword" type="password" placeholder="••••••" autocomplete="off"/>
      </div>
      <div class="set-field">
        <label>📧 Current Email (Security)</label>
        <input id="setOldEmail" type="email" placeholder="current email..." autocomplete="off"/>
      </div>
      <div id="setErr" class="set-err"></div>
      <div class="set-btns">
        <button class="set-verify-btn" id="setVerifyBtn" onclick="verifySettings()">🔓 Verify Karo</button>
        <button class="set-cancel-btn" onclick="closeSettings()">Cancel</button>
      </div>
    </div>

    <!-- CHANGE SECTION (hidden until verified) -->
    <div id="setChangeArea" style="display:none;">
      <div class="set-divider">Kya change karna hai?</div>
      <div class="set-field">
        <label>📧 Nai Email <span style="opacity:.4;font-size:.7rem">(khali raho agar na badalna ho)</span></label>
        <input id="setNewEmail" type="email" placeholder="" autocomplete="off"/>
      </div>
      <div class="set-field">
        <label>💕 Naya Naam <span style="opacity:.4;font-size:.7rem">(khali raho agar na badalna ho)</span></label>
        <input id="setNewName" type="text" placeholder="" maxlength="20" autocomplete="off"/>
      </div>
      <div id="setErr2" class="set-err"></div>
      <div class="set-btns">
        <button class="set-save-btn" onclick="saveSettings()">💾 Save Karo</button>
        <button class="set-cancel-btn" onclick="closeSettings()">Cancel</button>
      </div>
    </div>

  </div>
</div>

// PASSWORD SCREEN
// ════════════════════════════════════════════════
let passAttempts = 0;
const MAX_ATTEMPTS = 5;

function toggleEye(){
  const inp = document.getElementById('passInput');
  inp.type = inp.type==='password' ? 'text' : 'password';
}
function updateDots(len){
  for(let i=0;i<4;i++)
    document.getElementById('d'+i).className = 'dot'+(i < Math.min(len,4) ? ' filled' : '');
}
document.getElementById('passInput').addEventListener('input', function(){
  updateDots(this.value.length);
  document.getElementById('passErr').classList.remove('show');
});
document.getElementById('passInput').addEventListener('keydown', function(e){
  if(e.key==='Enter') checkPass();
});
function checkPass(){
  const val = document.getElementById('passInput').value;
  if(val === SECRET_PASSWORD){
    playWelcomeVoice();
    const ps = document.getElementById('passScreen');
    ps.style.transition='opacity .6s'; ps.style.opacity='0';
    setTimeout(()=>{
      ps.style.display='none';
      const ns = document.getElementById('nameScreen');
      ns.classList.add('visible');
      setTimeout(()=>document.getElementById('nameEntry').focus(), 300);
    }, 600);
  } else {
    passAttempts++;
    const err = document.getElementById('passErr');
    for(let i=0;i<4;i++) document.getElementById('d'+i).classList.add('wrong');
    setTimeout(()=>{ for(let i=0;i<4;i++) document.getElementById('d'+i).className='dot'; }, 600);
    document.getElementById('passInput').value='';
    updateDots(0);
    if(passAttempts >= MAX_ATTEMPTS){
      err.textContent='🚫 Zyada galat koshishein — reload karein';
      err.classList.add('show');
      document.getElementById('passBtn').disabled=true;
      document.getElementById('passInput').disabled=true;
    } else {
      err.textContent=`❌ Wrong password — ${MAX_ATTEMPTS-passAttempts} mauqa baqi`;
      err.classList.add('show');
    }
  }
}

function submitName(){
  const v   = document.getElementById('nameEntry').value.trim();
  const err = document.getElementById('nameErr');
  if(!v){
    err.textContent='❌ Naam likho'; err.classList.add('show');
    setTimeout(()=>err.classList.remove('show'),2000); return;
  }
  if(v.toLowerCase() !== userName.toLowerCase()){
    err.textContent='❌ Galat naam — sirf tera naam chalega 💕';
    err.classList.add('show');
    const inp = document.getElementById('nameEntry');
    inp.style.borderColor='var(--accent)';
    inp.style.animation='shake .4s ease';
    setTimeout(()=>{ inp.style.animation=''; inp.style.borderColor=''; },400);
    setTimeout(()=>err.classList.remove('show'),2500); return;
  }
  document.getElementById('overlayName').textContent = userName;
  const ns = document.getElementById('nameScreen');
  ns.style.opacity='0';
  setTimeout(()=>{ ns.style.display='none'; document.getElementById('loadScreen').classList.add('visible'); },500);
}
document.getElementById('nameEntry').addEventListener('keydown', e=>{ if(e.key==='Enter') submitName(); });

function openSettings(){
  document.getElementById('settingsModal').classList.add('open');
  document.getElementById('setPassword').value='';
  document.getElementById('setOldEmail').value='';
  document.getElementById('setNewEmail').value='';
  document.getElementById('setNewName').value='';
  document.getElementById('setErr').textContent='';
  document.getElementById('setErr2').textContent='';
  document.getElementById('setVerifySection').style.display='block';
  document.getElementById('setChangeArea').style.display='none';
}
function closeSettings(){
  document.getElementById('settingsModal').classList.remove('open');
}
function verifySettings(){
  const pass     = document.getElementById('setPassword').value;
  const oldEmail = document.getElementById('setOldEmail').value.trim();
  const err      = document.getElementById('setErr');
  if(pass !== SECRET_PASSWORD || oldEmail.toLowerCase() !== NOTIFY_EMAIL.toLowerCase()){
    err.textContent='❌ Password ya email galat hai';
    return;
  }
  err.textContent='';
  document.getElementById('setVerifySection').style.display='none';
  document.getElementById('setChangeArea').style.display='block';
  document.getElementById('setNewEmail').placeholder='→ ' + NOTIFY_EMAIL;
  document.getElementById('setNewName').placeholder='→ ' + userName;
}
function saveSettings(){
  const newEmail = document.getElementById('setNewEmail').value.trim();
  const newName  = document.getElementById('setNewName').value.trim();
  const err      = document.getElementById('setErr2');
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(newEmail && !emailRegex.test(newEmail)){
    err.textContent='❌ Sahi email format daalo'; return;
  }
  const changed = [];
  if(newEmail){
    NOTIFY_EMAIL = newEmail;
    localStorage.setItem('pw_notify_email', NOTIFY_EMAIL);
    changed.push('Email');
  }
  if(newName){
    userName = newName.charAt(0).toUpperCase() + newName.slice(1).toLowerCase();
    localStorage.setItem('pw_user_name', userName);
    document.getElementById('overlayName').textContent = userName;
    changed.push('Naam');
  }
  closeSettings();
  showToast(changed.length ? '✅ ' + changed.join(' & ') + ' permanently save ho gaya!' : 'ℹ️ Kuch nahi badla');
}
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,200,83,0.95);color:#000;padding:10px 24px;border-radius:50px;font-family:Rajdhani,sans-serif;font-weight:700;letter-spacing:1px;z-index:9999;transition:opacity .4s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2500);
}

const STEP_IDS   = ['s5','s4','s3','s1','s2'];
const STEP_HINTS = [
  '✋ Pehle 5 fingers dikhao',
  '🖐️ Ab 4 fingers dikhao',
  '🤟 Ab 3 fingers dikhao',
  '☝️ Ab 1 finger dikhao',
  '✌️ 2 fingers se screen saaf karo',
];

function updateStepUI(){
  STEP_IDS.forEach((id,i)=>{
    const el=document.getElementById(id);
    el.className='step-dot'+(i<currentStep?' done':i===currentStep?' active':'');
  });
  const hint=document.getElementById('stepHint');
  if(currentStep<5){
    hint.textContent=STEP_HINTS[currentStep];
    hint.style.opacity='1';
  } else {
    hint.style.opacity='0';
  }
}
updateStepUI();

// ════════════════════════════════════════════════
// PARTICLE CLASS
// ════════════════════════════════════════════════
class P{
  constructor(x,y,kind){
    this.x=x;this.y=y;this.kind=kind;
    this.maxL=kind==='trail'?85+Math.random()*55:kind==='heart'?HEART_LIFE+Math.random()*90:HEART_LIFE*1.4+Math.random()*60;
    this.L=this.maxL;
    this.sz=kind==='trail'?1.8+Math.random()*2.8:kind==='heart'?2.2+Math.random()*2.4:1.8+Math.random()*2;
    this.vx=(Math.random()-.5)*(kind==='trail'?1.6:0.38);
    this.vy=(Math.random()-.5)*(kind==='trail'?1.6:0.38)-(kind==='trail'?.4:.08);
    this.hue=kind==='trail'?265+Math.random()*95:kind==='heart'?338+Math.random()*28:44+Math.random()*36;
    this.twinkle=Math.random()>.62;
  }
  tick(){this.x+=this.vx;this.y+=this.vy;this.vx*=.976;this.vy*=.976;this.L--;}
  draw(c){
    const a=this.L/this.maxL,s=this.sz*a;
    if(s<.15)return;
    c.save();
    c.globalAlpha=a*(this.twinkle&&frameN%8<4?1:.88);
    c.shadowBlur=this.twinkle&&frameN%8<4?14:5;
    c.shadowColor=`hsl(${this.hue},100%,65%)`;
    c.fillStyle=`hsl(${this.hue},100%,${60+a*25}%)`;
    c.beginPath();c.arc(this.x,this.y,s,0,Math.PI*2);c.fill();
    c.restore();
  }
}

// ════════════════════════════════════════════════
// HEART MATH
// ════════════════════════════════════════════════
function heartXY(t,cx,cy,r){
  return{
    x:cx+r*16*Math.pow(Math.sin(t),3),
    y:cy-r*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
}
function inHeart(px,py,cx,cy,r){
  const nx=(px-cx)/r,ny=(py-cy)/r;
  return Math.pow(nx*nx+ny*ny-1,3)-nx*nx*Math.pow(-ny,3)<=0.06;
}

// ════════════════════════════════════════════════
// TEXT → PIXEL POINTS
// ════════════════════════════════════════════════
function textPoints(txt,cx,cy,maxW,maxH){
  const fs=Math.min(maxW/Math.max(txt.length,1)*1.3,maxH*.55,65);
  const off=document.createElement('canvas');
  off.width=maxW;off.height=maxH;
  const oc=off.getContext('2d');
  oc.fillStyle='white';
  oc.font=`bold ${fs}px "Rajdhani",sans-serif`;
  oc.textAlign='center';oc.textBaseline='middle';
  oc.fillText(txt,maxW/2,maxH/2);
  const img=oc.getImageData(0,0,maxW,maxH).data;
  const pts=[],step=Math.max(2,Math.floor(fs/14));
  for(let py=0;py<maxH;py+=step)
    for(let px=0;px<maxW;px+=step){
      if(img[(py*maxW+px)*4+3]>100) pts.push({x:cx-maxW/2+px,y:cy-maxH/2+py});
    }
  return pts;
}

// ════════════════════════════════════════════════
// SPAWN HEART  — name + "I LOVE YOU" inside
// ════════════════════════════════════════════════
function spawnHeart(cx,cy){
  hCX=cx;hCY=cy;
  hR=Math.min(W,H)*.185;
  heartActive=true;heartFrameCount=0;
  heartParts=[];nameParts=[];

  const SCALE=hR/16;
  // Outline (2 passes)
  for(let loop=0;loop<2;loop++){
    for(let i=0;i<260;i++){
      const t=(i/260)*Math.PI*2;
      const{x,y}=heartXY(t,cx,cy,SCALE);
      const p=new P(x,y,'heart');
      p.vx=(Math.random()-.5)*.5;p.vy=(Math.random()-.5)*.5;
      heartParts.push(p);
    }
  }
  // Fill
  for(let i=0;i<380;i++){
    const rx=(Math.random()-.5)*hR*2,ry=(Math.random()-.5)*hR*2;
    if(inHeart(cx+rx,cy+ry,cx,cy,hR)){
      const p=new P(cx+rx,cy+ry,'heart');
      p.sz=.8+Math.random()*1.5;
      p.L=p.maxL*(.35+Math.random()*.65);
      heartParts.push(p);
    }
  }

  // ── Name (upper half of heart) — larger area, no clipping
  const nameY = cy - hR*.15;
  const nameW = hR * 1.55;
  const nameH = hR * 0.48;
  const namePts=textPoints(userName,cx,nameY,nameW,nameH);
  namePts.forEach(pt=>{ nameParts.push(new P(pt.x,pt.y,'name')); });

  // ── "I LOVE YOU" (lower half of heart) — no clipping
  const ilyY = cy + hR*.28;
  const ilyW = hR * 1.45;
  const ilyH = hR * 0.42;
  const ilyPts=textPoints('I LOVE YOU',cx,ilyY,ilyW,ilyH);
  ilyPts.forEach(pt=>{
    const p=new P(pt.x,pt.y,'name');
    p.hue=340+Math.random()*30;
    nameParts.push(p);
  });

  // ── CSS text overlay (visible above canvas)
  document.getElementById('overlayName').textContent=userName;
  const ov=document.getElementById('heartOverlay');
  ov.style.opacity='1';
  if(overlayTimer) clearTimeout(overlayTimer);
  overlayTimer=setTimeout(()=>{ ov.style.opacity='0'; }, (HEART_LIFE+100)*(1000/60));
}

// ════════════════════════════════════════════════
// DRAW LOOP
// ════════════════════════════════════════════════
function loop(){
  frameN++;
  ctx.fillStyle='rgba(7,0,15,.19)';
  ctx.fillRect(0,0,W,H);
  for(let i=particles.length-1;i>=0;i--){particles[i].tick();particles[i].draw(ctx);if(particles[i].L<=0)particles.splice(i,1);}
  if(heartActive){
    heartFrameCount++;
    for(let i=heartParts.length-1;i>=0;i--){heartParts[i].tick();heartParts[i].draw(ctx);if(heartParts[i].L<=0)heartParts.splice(i,1);}
    for(let i=nameParts.length-1;i>=0;i--){nameParts[i].tick();nameParts[i].draw(ctx);if(nameParts[i].L<=0)nameParts.splice(i,1);}
    if(heartFrameCount>HEART_LIFE+120&&heartParts.length===0&&nameParts.length===0)heartActive=false;
  }
  if(cursorPos){
    const g=ctx.createRadialGradient(cursorPos.x,cursorPos.y,0,cursorPos.x,cursorPos.y,24);
    g.addColorStop(0,'rgba(0,245,255,.75)');g.addColorStop(1,'rgba(0,245,255,0)');
    ctx.beginPath();ctx.arc(cursorPos.x,cursorPos.y,24,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  }
  requestAnimationFrame(loop);
}
loop();

// MEDIAPIPE
// ════════════════════════════════════════════════
let hands,mpCam;
async function startCamera(){
  document.getElementById('startBtn').style.display='none';
  document.getElementById('spinner').style.display='block';
  const vid=document.getElementById('video');

  // Pehle explicit permission maango
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    stream.getTracks().forEach(t=>t.stop()); // sirf permission ke liye, MediaPipe khud handle karega
  } catch(err){
    document.getElementById('spinner').style.display='none';
    document.getElementById('startBtn').style.display='block';
    document.getElementById('startBtn').textContent='⚠ Camera Allow Karo & Retry';
    document.getElementById('startBtn').style.background='linear-gradient(135deg,#ff6600,#ff2d78)';
    alert('Camera access nahi mili! Browser mein camera allow karein aur dobara try karein.\n\nError: '+err.message);
    return;
  }

  hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:.65,minTrackingConfidence:.55});
  hands.onResults(onResults);
  mpCam=new Camera(vid,{onFrame:async()=>{await hands.send({image:vid});},width:640,height:480});

  try {
    await mpCam.start();
  } catch(err){
    document.getElementById('spinner').style.display='none';
    document.getElementById('startBtn').style.display='block';
    document.getElementById('startBtn').textContent='⚠ Retry Camera';
    alert('Camera start nahi hua: '+err.message);
    return;
  }

  setTimeout(()=>{
    const ls=document.getElementById('loadScreen');
    ls.style.opacity='0';
    setTimeout(()=>ls.style.display='none',800);
    cameraReady=true;
    document.getElementById('statusDot').classList.add('on');
    document.getElementById('statusTxt').textContent='Camera Live';
  },1200);
}

// ════════════════════════════════════════════════
// FINGER COUNT — relaxed, works for any hand
// ════════════════════════════════════════════════
function countFingers(lm, side){
  let count = 0;
  // Thumb — compare tip x vs mcp x (works both hands)
  const thumbOpen = Math.abs(lm[4].x - lm[0].x) > Math.abs(lm[3].x - lm[0].x);
  if(thumbOpen) count++;
  // Other 4 fingers — tip y above pip y (relaxed threshold)
  const tips = [8, 12, 16, 20];
  const pips = [6, 10, 14, 18];
  for(let i = 0; i < 4; i++){
    if(lm[tips[i]].y < lm[pips[i]].y) count++;
  }
  return count;
}

let stepCooldown = false;
let holdTimer = null;
let holdFingers = -1;
let holdInterval = null;
let holdStart = 0;
const HOLD_MS = 2000;

function triggerStep(nextStep, action){
  clearInterval(holdInterval); holdInterval=null;
  document.getElementById('stepHint').style.background='';
  action();
  currentStep = nextStep;
  updateStepUI();
  stepCooldown = true;
  holdFingers = -1;
  setTimeout(()=>{ stepCooldown=false; }, 500);
}

function onResults(res){
  if(!res.multiHandLandmarks||res.multiHandLandmarks.length===0){
    cursorPos=null;prevFinger=null;
    document.getElementById('fingerDisp').textContent='Fingers: 0';
    clearTimeout(holdTimer); holdTimer=null;
    clearInterval(holdInterval); holdInterval=null;
    holdFingers=-1;
    document.getElementById('stepHint').style.background='';
    return;
  }
  const lm=res.multiHandLandmarks[0];
  const side=res.multiHandedness&&res.multiHandedness[0]?res.multiHandedness[0].label:'Right';
  const fingers=countFingers(lm,side);
  document.getElementById('fingerDisp').textContent=`Fingers: ${fingers}`;
  const ix=(1-lm[8].x)*W, iy=lm[8].y*H;
  cursorPos={x:ix,y:iy};

  if(stepCooldown) return;

  const needed = [5,4,3,1,2][currentStep];
  if(currentStep>=5 || needed===undefined) return;

  if(fingers === needed){
    if(holdFingers !== fingers){
      holdFingers = fingers;
      holdStart = Date.now();
      clearTimeout(holdTimer);
      clearInterval(holdInterval);
      const capturedStep = currentStep;
      const capturedLm = lm;
      holdInterval = setInterval(()=>{
        const pct = Math.min(100, (Date.now()-holdStart)/HOLD_MS*100);
        document.getElementById('stepHint').style.background =
          `linear-gradient(to right, rgba(0,245,255,0.25) ${pct}%, transparent ${pct}%)`;
      }, 50);
      holdTimer = setTimeout(()=>{
        clearInterval(holdInterval); holdInterval=null;
        document.getElementById('stepHint').style.background='';
        if(capturedStep===0) triggerStep(1,()=>{ const px=(1-capturedLm[9].x)*W,py=capturedLm[9].y*H; spawnHeart(px,py); });
        else if(capturedStep===1) triggerStep(2,()=>{ showGesturePopup('🖐️',userName,getMsg('m4')); });
        else if(capturedStep===2) triggerStep(3,()=>{ showGesturePopup('🤟',userName,getMsg('m3')); });
        else if(capturedStep===3) triggerStep(4,()=>{ showProposal(); });
        else if(capturedStep===4) triggerStep(5,()=>{ particles=[];heartParts=[];nameParts=[];heartActive=false; });
      }, HOLD_MS);
    }
  } else {
    // Wrong fingers — reset
    clearTimeout(holdTimer); holdTimer=null;
    clearInterval(holdInterval); holdInterval=null;
    holdFingers=-1;
    document.getElementById('stepHint').style.background='';
  }
}
